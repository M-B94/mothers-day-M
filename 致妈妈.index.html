<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>是妈妈是女儿 - 母亲节快乐</title>
    <style>
        /* --- 全局样式重置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            /* 粉紫+柔蓝 温柔渐变背景 */
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 25%, #fce7f3 50%, #f3e8ff 75%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 强化版星光背景 --- */
        #stars-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

       .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0.6;
            /* 新增发光光晕，让星光更明显 */
            box-shadow: 0 0 4px 2px rgba(255, 255, 255, 0.6);
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.4; 
                transform: scale(1); 
                box-shadow: 0 0 3px 1px rgba(255, 255, 255, 0.5);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2); 
                box-shadow: 0 0 6px 3px rgba(255, 255, 255, 0.8);
            }
        }

        /* --- 新增：开场弹窗遮罩 --- */
       .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 231, 255, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

       .modal-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* --- 新增：弹窗卡片 --- */
       .modal-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 450px;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: modalShow 0.6s ease-out;
        }

        @keyframes modalShow {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

       .modal-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: beat 1.5s infinite ease-in-out;
        }

       .modal-title {
            color: #6366f1;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

       .modal-text {
            color: #8b5cf6;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

       .modal-btn {
            width: 100%;
            max-width: 200px;
            height: 50px;
            border-radius: 25px;
            background: linear-gradient(135deg, #a78bfa 0%, #93c5fd 100%);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

       .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
        }

       .modal-btn:active {
            transform: scale(0.95);
        }

        /* --- 主卡片容器 --- */
       .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 520px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.12);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.7);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

       .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 标题与文字区域 --- */
       .heart-icon {
            font-size: 42px;
            margin-bottom: 20px;
            color: #8b5cf6;
            animation: beat 1.5s infinite ease-in-out;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            /* 柔蓝紫主标题色 */
            color: #6366f1;
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

       .sub-text {
            /* 柔化紫蓝副标题色 */
            color: #8b5cf6;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- 播放器区域（蓝调适配） --- */
       .player-box {
            background-color: #f0f7ff;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 25px;
            border: 1px solid rgba(191, 219, 254, 0.5);
        }

       .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 18px;
        }

        /* 播放按钮（粉蓝渐变） */
        #playBtn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa 0%, #93c5fd 100%);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #playBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
        }

        #playBtn:active {
            transform: scale(0.95);
        }

        /* 进度条（蓝调适配） */
       .progress-wrapper {
            width: 100%;
            height: 6px;
            background: #bfdbfe;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

       .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6 0%, #60a5fa 100%);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

       .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6366f1;
            margin-top: 8px;
        }

        /* --- 歌词显示区域 --- */
       .lyrics-box {
            background-color: rgba(255, 255, 255, 0.65);
            border-radius: 12px;
            height: 180px;
            overflow-y: hidden;
            padding: 15px;
            position: relative;
            border: 1px solid #e0e7ff;
        }

       .lyrics-content {
            transition: transform 0.5s ease-out;
        }

       .lyric-line {
            color: #94a3b8;
            font-size: 15px;
            padding: 8px 0;
            line-height: 1.5;
            transition: all 0.3s;
        }

       .lyric-line.active {
            /* 蓝调高亮色 */
            color: #4f46e5;
            font-weight: 600;
            font-size: 16px;
            transform: scale(1.02);
        }

        /* --- 新增：播放结束全屏大花容器 --- */
       .flower-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(240, 249, 255, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: flowerFadeIn 1s ease-out;
            cursor: pointer;
        }

       .flower-container.show {
            display: flex;
        }

        @keyframes flowerFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

       .flower-svg {
            width: 80%;
            max-width: 600px;
            animation: flowerBloom 2s ease-out forwards;
            transform: scale(0);
        }

        @keyframes flowerBloom {
            0% {
                transform: scale(0) rotate(0deg);
            }
            70% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

       .flower-text {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #8b5cf6;
            font-size: 1.5rem;
            font-weight: 600;
            animation: textUp 1.5s ease-out 1s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes textUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

       .flower-tip {
            position: absolute;
            bottom: 8%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #a78bfa;
            font-size: 0.9rem;
            animation: textUp 1.5s ease-out 1.5s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* --- 移动端自适应优化 --- */
        @media (max-width: 480px) {
           .card {

            }

            }
           .flower-text {
                font-size: 1.2rem;
            }
           .flower-svg {
                max-width: 400px;
            }
        }
    </style>
</head>
<body>

    <script>

        // ===================== 新增：开场弹窗逻辑 =====================
        const startModal = document.getElementById('startModal');
        const startBtn = document.getElementById('startBtn');
        const mainCard = document.getElementById('mainCard');
        const flowerBox = document.getElementById('flowerBox');

        // 点击开启按钮，关闭弹窗，显示主页面，播放音乐
        startBtn.addEventListener('click', () => {
            startModal.classList.add('hidden');
            mainCard.classList.add('show');
            // 用户交互后播放音乐，解决浏览器自动播放限制
            audio.play().catch(err => {
                console.log('自动播放失败，可手动点击播放按钮', err);
            });
            // 1秒后隐藏弹窗DOM，避免遮挡
            setTimeout(() => {
                startModal.style.display = 'none';
            }, 500);
        });

        // ===================== 新增：点击花屏关闭 =====================
        flowerBox.addEventListener('click', () => {
            flowerBox.classList.remove('show');
        });

        // ===================== 原有功能逻辑代码 =====================

        // 1. 生成强化版星光背景
        const starField = document.getElementById('stars-field');
        function createStars() {
            // 星星数量从60增加到120，更明显的星光效果
            const starCount = 120;
            for(let i=0; i<starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                // 随机位置
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                // 随机大小（1-6px，更大的尺寸区间）
                const size = Math.random() * 5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                // 随机动画时长（2-4s，差异化闪烁）
                const duration = Math.random() * 2 + 2;
                star.style.animationDuration = duration + 's';
                // 随机动画延迟，避免所有星星同时闪烁
                star.style.animationDelay = Math.random() * duration + 's';
                starField.appendChild(star);
            }
        }
        createStars();

        // 2. LRC歌词解析函数
        function parseLRC(lrcString) {
            const lines = lrcString.split('\n');
            const lyricList = [];
            const timeRegExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;

            lines.forEach(line => {
                const timeMatch = timeRegExp.exec(line);
                if (timeMatch) {
                    // 转换时间戳为秒数
                    const minutes = parseInt(timeMatch[1]);
                    const seconds = parseInt(timeMatch[2]);
                    const milliseconds = parseInt(timeMatch[3]);
                    const totalTime = minutes * 60 + seconds + milliseconds / 1000;
                    // 提取歌词文本
                    const lyricText = line.replace(timeRegExp, '').trim();
                    if (lyricText) {
                        lyricList.push({ time: totalTime, text: lyricText });
                    }
                }
            });
            return lyricList.sort((a, b) => a.time - b.time);
        }

        const lyrics = parseLRC(lrcData);

        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');

        // 4. 渲染歌词到页面
        function renderLyrics() {
            lyricsContent.innerHTML = '';
            lyrics.forEach((item, index) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'lyric-line';
                lineDiv.textContent = item.text;
                lineDiv.dataset.index = index;
                lyricsContent.appendChild(lineDiv);
            });
        }
        renderLyrics();

        // 5. 时间格式化函数
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10? '0' : ''}${sec}`;
        }

        // 6. 播放/暂停控制
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log('播放失败，请点击页面后再尝试播放', err);
                    alert('浏览器限制自动播放，请点击播放按钮手动开启音乐');
                });
            } else {
                audio.pause();
            }
        });

        // 播放状态图标切换
        audio.addEventListener('play', () => {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        });
        audio.addEventListener('pause', () => {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        });

        // 7. 进度条更新与时间显示
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            // 更新进度条
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = progressPercent + '%';
            // 更新当前时间
            currentTimeEl.textContent = formatTime(audio.currentTime);
            // 同步歌词高亮与滚动
            syncLyrics(audio.currentTime);
        });

        // 点击进度条跳转播放进度
        progressContainer.addEventListener('click', (e) => {
            const containerWidth = progressContainer.clientWidth;
            const clickOffsetX = e.offsetX;
            audio.currentTime = (clickOffsetX / containerWidth) * audio.duration;
        });

        // 8. 歌词高亮与滚动同步
        let activeIndex = -1;
        function syncLyrics(currentTime) {
            let targetIndex = -1;
            // 匹配当前播放时间对应的歌词行
            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].time) {
                    targetIndex = i;
                } else {
                    break;
                }
            }

            // 仅当歌词行变化时更新
            if (targetIndex!== -1 && targetIndex!== activeIndex) {
                activeIndex = targetIndex;
                const allLyricLines = document.querySelectorAll('.lyric-line');
                
                // 移除所有高亮
                allLyricLines.forEach(line => line.classList.remove('active'));
                // 给当前行添加高亮
                if (allLyricLines[targetIndex]) {
                    allLyricLines[targetIndex].classList.add('active');
                    
                    // 歌词滚动居中计算
                    const lyricsBox = document.querySelector('.lyrics-box');
                    const boxHeight = lyricsBox.clientHeight;
                    const currentLine = allLyricLines[targetIndex];
                    const lineHeight = currentLine.offsetHeight;
                    const scrollOffset = currentLine.offsetTop - (boxHeight / 2) + (lineHeight / 2);
                    
                    // 执行滚动
                    lyricsContent.style.transform = `translateY(-${Math.max(0, scrollOffset)}px)`;
                }
            }
        }

        // 歌曲播放结束：弹出大花+重置进度
        audio.addEventListener('ended', () => {
            // 重置播放器
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            activeIndex = -1;
            lyricsContent.style.transform = 'translateY(0)';
            document.querySelectorAll('.lyric-line').forEach(line => line.classList.remove('active'));
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
            
            // 弹出全屏大花
            flowerBox.classList.add('show');
        });
    </script>
</body>
</html>
